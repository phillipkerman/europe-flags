<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Flag Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a2e;
    --parchment: #f5f0e8;
    --gold: #c8a951;
    --gold-light: #e8d08a;
    --red: #8b2635;
    --shadow: rgba(26,26,46,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: var(--ink);
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(200,169,81,0.07) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(139,38,53,0.1) 0%, transparent 50%),
      url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c8a951' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 3rem;
    font-family: 'Crimson Pro', serif;
  }

  header {
    text-align: center;
    margin-bottom: 2rem;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    color: var(--gold);
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    letter-spacing: 0.04em;
    line-height: 1.2;
  }

  header p {
    color: rgba(245,240,232,0.45);
    font-size: 1rem;
    font-style: italic;
    margin-top: 0.4rem;
    letter-spacing: 0.05em;
  }

  /* ── Tab nav ── */
  .tab-nav {
    display: flex;
    gap: 0;
    margin-bottom: 2rem;
    border: 1px solid rgba(200,169,81,0.3);
    border-radius: 4px;
    overflow: hidden;
  }

  .tab-btn {
    font-family: 'Playfair Display', serif;
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: transparent;
    color: rgba(200,169,81,0.5);
    border: none;
    padding: 0.6rem 1.4rem;
    cursor: pointer;
    transition: all 0.2s;
    border-right: 1px solid rgba(200,169,81,0.3);
  }

  .tab-btn:last-child { border-right: none; }

  .tab-btn.active {
    background: rgba(200,169,81,0.12);
    color: var(--gold);
  }

  .tab-btn:hover:not(.active) {
    background: rgba(200,169,81,0.06);
    color: rgba(200,169,81,0.75);
  }

  /* ── Views ── */
  #view-quiz, #view-picker { width: min(560px, 96vw); }

  /* ── Picker ── */
  #view-picker { display: none; }

  .region-block {
    margin-bottom: 1.6rem;
    border: 1px solid rgba(200,169,81,0.18);
    border-radius: 5px;
    overflow: hidden;
  }

  .region-header {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    padding: 0.75rem 1.1rem;
    background: rgba(200,169,81,0.07);
    cursor: pointer;
    user-select: none;
  }

  .region-header:hover { background: rgba(200,169,81,0.11); }

  .region-header label {
    font-family: 'Playfair Display', serif;
    color: var(--gold);
    font-size: 1rem;
    letter-spacing: 0.06em;
    cursor: pointer;
    flex: 1;
  }

  .region-count {
    font-size: 0.75rem;
    color: rgba(245,240,232,0.35);
    font-style: italic;
    letter-spacing: 0.05em;
  }

  .region-body {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 0;
  }

  .country-item {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.45rem 1.1rem;
    border-bottom: 1px solid rgba(200,169,81,0.07);
    cursor: pointer;
    transition: background 0.15s;
  }

  .country-item:hover { background: rgba(200,169,81,0.05); }

  .country-item label {
    color: rgba(245,240,232,0.7);
    font-size: 0.9rem;
    cursor: pointer;
    flex: 1;
  }

  .country-item .flag-thumb {
    width: 26px;
    height: 17px;
    object-fit: cover;
    border-radius: 1px;
    opacity: 0.85;
  }

  /* custom checkbox */
  input[type="checkbox"] {
    appearance: none;
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border: 1px solid rgba(200,169,81,0.4);
    border-radius: 2px;
    background: transparent;
    cursor: pointer;
    flex-shrink: 0;
    position: relative;
    transition: all 0.15s;
  }

  input[type="checkbox"]:checked {
    background: var(--gold);
    border-color: var(--gold);
  }

  input[type="checkbox"]:checked::after {
    content: '';
    position: absolute;
    left: 3px; top: 1px;
    width: 5px; height: 8px;
    border: 2px solid var(--ink);
    border-top: none; border-left: none;
    transform: rotate(45deg);
  }

  input[type="checkbox"]:indeterminate {
    background: rgba(200,169,81,0.4);
    border-color: var(--gold);
  }

  input[type="checkbox"]:indeterminate::after {
    content: '';
    position: absolute;
    left: 2px; top: 5px;
    width: 8px; height: 2px;
    background: var(--ink);
  }

  .region-checkbox { transform: scale(1.2); }

  .picker-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 1.2rem;
    flex-wrap: wrap;
    gap: 0.8rem;
  }

  .selected-summary {
    color: rgba(245,240,232,0.45);
    font-style: italic;
    font-size: 0.9rem;
  }

  .selected-summary strong {
    color: var(--gold-light);
    font-style: normal;
  }

  /* ── Quiz view ── */
  .progress-wrap {
    width: 100%;
    margin-bottom: 1.8rem;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  .progress-label {
    color: var(--gold-light);
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-align: right;
    font-family: 'Playfair Display', serif;
  }

  .progress-track {
    height: 3px;
    background: rgba(200,169,81,0.15);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--red), var(--gold));
    border-radius: 2px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
  }

  .card-stage {
    perspective: 1200px;
    width: 100%;
  }

  .card {
    width: 100%;
    aspect-ratio: 3/2;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.7s cubic-bezier(.4,0,.2,1);
    cursor: pointer;
  }

  .card.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 24px 60px var(--shadow), 0 0 0 1px rgba(200,169,81,0.2);
  }

  .card-front {
    background: var(--parchment);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card-front img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    padding: 1rem;
  }

  .card-front::before, .card-front::after {
    content: '✦';
    position: absolute;
    color: rgba(200,169,81,0.25);
    font-size: 0.7rem;
  }
  .card-front::before { top: 8px; left: 10px; }
  .card-front::after  { bottom: 8px; right: 10px; }

  .card-back {
    background: var(--ink);
    transform: rotateY(180deg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.6rem;
    border: 1px solid rgba(200,169,81,0.25);
  }

  .country-name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 6vw, 3rem);
    color: var(--gold);
    letter-spacing: 0.03em;
    text-align: center;
    padding: 0 1rem;
    line-height: 1.2;
  }

  .region-badge {
    font-size: 0.7rem;
    color: rgba(245,240,232,0.3);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-style: italic;
  }

  .country-flag-emoji { font-size: 2rem; opacity: 0.6; }

  .back-hint {
    font-size: 0.8rem;
    color: rgba(245,240,232,0.3);
    font-style: italic;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .controls {
    display: flex;
    gap: 1rem;
    margin-top: 2rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  button {
    font-family: 'Playfair Display', serif;
    font-size: 0.9rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border: none;
    border-radius: 3px;
    padding: 0.7rem 1.6rem;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .btn-reveal {
    background: linear-gradient(135deg, var(--gold) 0%, #a8862e 100%);
    color: var(--ink);
    font-weight: 700;
    box-shadow: 0 4px 14px rgba(200,169,81,0.3);
  }

  .btn-reveal:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 22px rgba(200,169,81,0.4);
  }

  .btn-next {
    background: transparent;
    color: var(--gold-light);
    border: 1px solid rgba(200,169,81,0.4);
  }

  .btn-next:hover {
    background: rgba(200,169,81,0.08);
    border-color: var(--gold);
    transform: translateY(-2px);
  }

  .btn-shuffle {
    background: transparent;
    color: rgba(245,240,232,0.4);
    border: 1px solid rgba(245,240,232,0.15);
    font-size: 0.8rem;
  }

  .btn-shuffle:hover {
    color: rgba(245,240,232,0.7);
    border-color: rgba(245,240,232,0.3);
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--gold) 0%, #a8862e 100%);
    color: var(--ink);
    font-weight: 700;
    box-shadow: 0 4px 14px rgba(200,169,81,0.3);
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 22px rgba(200,169,81,0.4);
  }

  .btn-ghost {
    background: transparent;
    color: rgba(245,240,232,0.4);
    border: 1px solid rgba(245,240,232,0.15);
    font-size: 0.8rem;
  }

  .score-row {
    margin-top: 1.5rem;
    display: flex;
    gap: 2rem;
    align-items: center;
  }

  .score-item { text-align: center; }

  .score-num {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    color: var(--gold);
    display: block;
    line-height: 1;
  }

  .score-label {
    font-size: 0.7rem;
    color: rgba(245,240,232,0.35);
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }

  .score-divider {
    width: 1px;
    height: 2rem;
    background: rgba(200,169,81,0.2);
  }

  .kbd-hint {
    margin-top: 1.2rem;
    color: rgba(245,240,232,0.2);
    font-size: 0.75rem;
    letter-spacing: 0.08em;
    text-align: center;
  }

  kbd {
    background: rgba(245,240,232,0.08);
    border: 1px solid rgba(245,240,232,0.15);
    border-radius: 3px;
    padding: 1px 5px;
    font-family: monospace;
    font-size: 0.7rem;
  }

  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: rgba(245,240,232,0.4);
    font-style: italic;
    font-size: 1.05rem;
  }

  .empty-state a {
    color: var(--gold);
    cursor: pointer;
    text-decoration: underline;
  }

  @media (max-width: 520px) {
    .controls { gap: 0.7rem; }
    button { padding: 0.65rem 1.1rem; font-size: 0.8rem; }
    .region-body { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<header>
  <h1>World Flag Flashcards</h1>
  <p>Europe · Central America · South America</p>
</header>

<div class="tab-nav">
  <button class="tab-btn active" onclick="showTab('quiz')">▶ Quiz</button>
  <button class="tab-btn" onclick="showTab('picker')">☰ Choose Flags</button>
</div>

<!-- QUIZ VIEW -->
<div id="view-quiz">
  <div class="progress-wrap">
    <div class="progress-label" id="progressLabel">1 of 0</div>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <div class="card-stage">
    <div class="card" id="card">
      <div class="card-face card-front">
        <img id="flagImg" src="" alt="Country flag">
      </div>
      <div class="card-face card-back">
        <span class="country-flag-emoji" id="flagEmoji"></span>
        <div class="country-name" id="countryName"></div>
        <div class="region-badge" id="regionBadge"></div>
        <div class="back-hint">click card to flip · next to advance</div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="btn-reveal" id="btnReveal" onclick="revealAnswer()">Reveal Answer</button>
    <button class="btn-next" id="btnNext" onclick="nextCard()" style="display:none">Next Card →</button>
    <button class="btn-shuffle" onclick="shuffleDeck()">⇄ Shuffle</button>
  </div>

  <div class="score-row">
    <div class="score-item">
      <span class="score-num" id="seenCount">0</span>
      <span class="score-label">Seen</span>
    </div>
    <div class="score-divider"></div>
    <div class="score-item">
      <span class="score-num" id="remainCount">0</span>
      <span class="score-label">Remaining</span>
    </div>
  </div>

  <div class="kbd-hint">
    <kbd>Space</kbd> reveal &nbsp;·&nbsp; <kbd>→</kbd> next &nbsp;·&nbsp; <kbd>S</kbd> shuffle
  </div>
</div>

<!-- PICKER VIEW -->
<div id="view-picker">
  <div id="pickerRegions"></div>
  <div class="picker-footer">
    <div class="selected-summary" id="selectedSummary"></div>
    <button class="btn-primary" onclick="applyAndQuiz()">Start Quiz →</button>
  </div>
</div>

];

const REGIONS = ["Europe", "Central America", "South America"];

// ── State ────────────────────────────────────────────────────
// selected: Set of country codes currently in the deck
let selected = new Set(ALL_COUNTRIES.map(c => c.code)); // all on by default
let deck = [];
let index = 0;
let revealed = false;

function flagUrl(code) {
  return `https://flagcdn.com/w320/${code}.png`;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ── Picker ────────────────────────────────────────────────────
function buildPicker() {
  const container = document.getElementById('pickerRegions');
  container.innerHTML = '';

  REGIONS.forEach(region => {
    const countries = ALL_COUNTRIES.filter(c => c.region === region);
    const regionId = region.replace(/\s+/g, '-');

    const block = document.createElement('div');
    block.className = 'region-block';

    // Header
    const header = document.createElement('div');
    header.className = 'region-header';
    header.innerHTML = `
      <input type="checkbox" class="region-checkbox" id="region-${regionId}" data-region="${region}">
      <label for="region-${regionId}">${region}</label>
      <span class="region-count" id="count-${regionId}"></span>
    `;
    block.appendChild(header);

    // Country list
    const body = document.createElement('div');
    body.className = 'region-body';

    countries.forEach(c => {
      const item = document.createElement('div');
      item.className = 'country-item';
      item.innerHTML = `
        <input type="checkbox" id="cb-${c.code}" data-code="${c.code}" data-region="${region}" ${selected.has(c.code) ? 'checked' : ''}>
        <img class="flag-thumb" src="${flagUrl(c.code)}" alt="">
        <label for="cb-${c.code}">${c.name}</label>
      `;
      body.appendChild(item);

      item.querySelector('input').addEventListener('change', e => {
        if (e.target.checked) selected.add(c.code);
        else selected.delete(c.code);
        updateRegionCheckbox(region);
        updateSummary();
      });
    });

    block.appendChild(body);
    container.appendChild(block);

    // Region master checkbox logic
    const regionCb = header.querySelector('input');
    regionCb.addEventListener('change', e => {
      const checked = e.target.checked;
      countries.forEach(c => {
        if (checked) selected.add(c.code);
        else selected.delete(c.code);
      });
      // update individual checkboxes
      body.querySelectorAll('input[type=checkbox]').forEach(cb => cb.checked = checked);
      updateRegionCheckbox(region);
      updateSummary();
    });

    updateRegionCheckbox(region);
  });

  updateSummary();
}

function updateRegionCheckbox(region) {
  const regionId = region.replace(/\s+/g, '-');
  const countries = ALL_COUNTRIES.filter(c => c.region === region);
  const checkedCount = countries.filter(c => selected.has(c.code)).length;
  const cb = document.getElementById(`region-${regionId}`);
  const countEl = document.getElementById(`count-${regionId}`);

  if (checkedCount === 0) {
    cb.checked = false;
    cb.indeterminate = false;
  } else if (checkedCount === countries.length) {
    cb.checked = true;
    cb.indeterminate = false;
  } else {
    cb.checked = false;
    cb.indeterminate = true;
  }
  countEl.textContent = `${checkedCount} / ${countries.length}`;
}

function updateSummary() {
  document.getElementById('selectedSummary').innerHTML =
    `<strong>${selected.size}</strong> flag${selected.size !== 1 ? 's' : ''} selected`;
}

function applyAndQuiz() {
  if (selected.size === 0) {
    alert('Please select at least one country.');
    return;
  }
  showTab('quiz');
  startDeck();
}

// ── Quiz ──────────────────────────────────────────────────────
function startDeck() {
  const activeDeck = ALL_COUNTRIES.filter(c => selected.has(c.code));
  deck = shuffle(activeDeck);
  index = 0;
  loadCard();
}

function loadCard() {
  revealed = false;
  const card = document.getElementById('card');
  card.classList.remove('flipped');

  if (index >= deck.length) { showCompletion(); return; }

  const c = deck[index];
  document.getElementById('flagImg').src = flagUrl(c.code);
  document.getElementById('flagImg').alt = `Flag of ${c.name}`;
  document.getElementById('countryName').textContent = c.name;
  document.getElementById('flagEmoji').textContent = c.emoji;
  document.getElementById('regionBadge').textContent = c.region;
  document.getElementById('btnReveal').style.display = '';
  document.getElementById('btnNext').style.display = 'none';

  // Restore card HTML if we replaced it during completion
  const stage = document.querySelector('.card-stage');
  if (!stage.querySelector('.card')) {
    stage.innerHTML = `
      <div class="card" id="card">
        <div class="card-face card-front"><img id="flagImg" src="" alt=""></div>
        <div class="card-face card-back">
          <span class="country-flag-emoji" id="flagEmoji"></span>
          <div class="country-name" id="countryName"></div>
          <div class="region-badge" id="regionBadge"></div>
          <div class="back-hint">click card or press space to continue</div>
        </div>
      </div>`;
    attachCardClick();
  }

  updateProgress();
}

function updateProgress() {
  const total = deck.length;
  document.getElementById('progressLabel').textContent = `${index + 1} of ${total}`;
  document.getElementById('progressFill').style.width = `${(index / total) * 100}%`;
  document.getElementById('seenCount').textContent = index;
  document.getElementById('remainCount').textContent = total - index;
}

function revealAnswer() {
  if (revealed) return;
  revealed = true;
  document.getElementById('card').classList.add('flipped');
  document.getElementById('btnReveal').style.display = 'none';
  document.getElementById('btnNext').style.display = '';
}

function nextCard() {
  index++;
  const card = document.getElementById('card');
  card.classList.remove('flipped');
  setTimeout(() => { loadCard(); }, 350);
}

function shuffleDeck() {
  deck = shuffle(deck);
  index = 0;
  loadCard();
}

function showCompletion() {
  document.querySelector('.card-stage').innerHTML = `
    <div style="text-align:center; padding:3rem 1rem; border:1px solid rgba(200,169,81,0.18); border-radius:6px;">
      <div style="font-size:3rem; margin-bottom:1rem;">🎉</div>
      <h2 style="font-family:'Playfair Display',serif; color:var(--gold); font-size:2rem; margin-bottom:0.8rem;">Round Complete!</h2>
      <p style="color:rgba(245,240,232,0.55); font-style:italic; font-size:1.1rem; margin-bottom:1.5rem;">You've been through all ${deck.length} flags.</p>
      <button class="btn-reveal" onclick="restartDeck()">↺ Play Again</button>
    </div>`;
  document.getElementById('btnReveal').style.display = 'none';
  document.getElementById('btnNext').style.display = 'none';
}

function restartDeck() {
  deck = shuffle(deck);
  index = 0;
  // Rebuild the card HTML since we replaced it
  document.querySelector('.card-stage').innerHTML = `
    <div class="card" id="card">
      <div class="card-face card-front"><img id="flagImg" src="" alt="Country flag"></div>
      <div class="card-face card-back">
        <span class="country-flag-emoji" id="flagEmoji"></span>
        <div class="country-name" id="countryName"></div>
        <div class="region-badge" id="regionBadge"></div>
        <div class="back-hint">click card to flip · next to advance</div>
      </div>
    </div>`;
  attachCardClick();
  loadCard();
}
function attachCardClick() {
  const card = document.getElementById('card');
  if (card) {
    card.addEventListener('click', () => {
      if (!revealed) revealAnswer();
      else card.classList.toggle('flipped');
    });
  }
}

// ── Tab switching ─────────────────────────────────────────────
function showTab(tab) {
  document.getElementById('view-quiz').style.display   = tab === 'quiz'   ? 'block' : 'none';
  document.getElementById('view-picker').style.display = tab === 'picker' ? 'block' : 'none';
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && tab === 'quiz') || (i === 1 && tab === 'picker'));
  });
  // Coming back to picker restarts session when they hit Start Quiz
}

// ── Keyboard ──────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (document.getElementById('view-quiz').style.display === 'none') return;
  if (e.key === ' ' || e.key === 'Spacebar') { e.preventDefault(); if (!revealed) revealAnswer(); else nextCard(); }
  if (e.key === 'ArrowRight') { if (revealed) nextCard(); }
  if (e.key === 's' || e.key === 'S') shuffleDeck();
});

// ── Init ──────────────────────────────────────────────────────
buildPicker();
startDeck();
attachCardClick();
</script>

</body>
</html>
